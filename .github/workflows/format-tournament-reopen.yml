name: Format tournament reopen changes

on:
  push:
    branches:
      - codex/fix-tournament-reopen

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, 'chore: format tournament reopen changes') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smkc-score-app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-tournament-reopen
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json
      - run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          "src/app/tournaments/[id]/layout.tsx"
          "src/lib/tournament-status-update.ts"
          "__tests__/lib/tournament-status-update.test.ts"
          "__tests__/static/tournament-status-controls.test.ts"
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/app/tournaments/[id]/layout.tsx src/lib/tournament-status-update.ts \
            __tests__/lib/tournament-status-update.test.ts \
            __tests__/static/tournament-status-controls.test.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: format tournament reopen changes"
            git push origin HEAD:codex/fix-tournament-reopen
          fi
