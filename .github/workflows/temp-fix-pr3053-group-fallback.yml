name: Temporary fix PR 3053 group fallback

on:
  push:
    branches:
      - codex/new-tournaments-cdm-only
  pull_request:
    branches:
      - main

concurrency:
  group: fix-pr3053-group-fallback
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/new-tournaments-cdm-only

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install current dependencies
        working-directory: smkc-score-app
        run: npm ci --silent --no-audit --no-fund

      - name: Apply review fixes
        run: python3 .github/scripts/fix_pr3053_group_fallback.py

      - name: Refresh lockfile for safe PostCSS
        working-directory: smkc-score-app
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install updated dependencies
        working-directory: smkc-score-app
        run: npm ci --silent --no-audit --no-fund

      - name: Format changed files
        working-directory: smkc-score-app
        run: |
          npx prettier --write \
            src/lib/api-factories/qualification-route.ts \
            __tests__/lib/api-factories/qualification-route.test.ts \
            package.json \
            package-lock.json

      - name: Focused tests
        id: focused
        shell: bash
        run: |
          set +e
          cd smkc-score-app
          npx jest --runTestsByPath \
            "__tests__/lib/api-factories/qualification-route.test.ts" \
            "__tests__/app/api/tournaments/route.test.ts" \
            --runInBand --no-coverage > ../.github/pr3053-focused-test.log 2>&1
          status=$?
          cat ../.github/pr3053-focused-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit focused-test diagnostics on failure
        if: steps.focused.outputs.status != '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/pr3053-focused-test.log
          git commit -m "chore: record PR 3053 focused-test failure"
          git push origin HEAD:codex/new-tournaments-cdm-only
          exit 1

      - name: Full unit tests
        if: steps.focused.outputs.status == '0'
        working-directory: smkc-score-app
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Security audit
        if: steps.focused.outputs.status == '0'
        working-directory: smkc-score-app
        run: npm audit --audit-level=high

      - name: Production build
        if: steps.focused.outputs.status == '0'
        working-directory: smkc-score-app
        run: npm run build

      - name: Commit verified fixes
        if: steps.focused.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add smkc-score-app
          git commit -m "fix: fall back to circle schedule for small groups"
          git push origin HEAD:codex/new-tournaments-cdm-only
