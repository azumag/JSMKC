name: Temporary fix PR 3053 group fallback

on:
  push:
    branches:
      - codex/new-tournaments-cdm-only
  pull_request:
    branches:
      - main

concurrency:
  group: fix-pr3053-group-fallback
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fix-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/new-tournaments-cdm-only

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install current dependencies
        working-directory: smkc-score-app
        run: npm ci --silent --no-audit --no-fund

      - name: Apply review fixes
        run: |
          python3 .github/scripts/fix_pr3053_group_fallback.py
          python3 .github/scripts/fix_pr3053_legacy_test_expectations.py

      - name: Refresh lockfile for safe PostCSS
        working-directory: smkc-score-app
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Install updated dependencies
        working-directory: smkc-score-app
        run: npm ci --silent --no-audit --no-fund

      - name: Format changed files
        working-directory: smkc-score-app
        run: |
          npx prettier --write \
            src/lib/api-factories/qualification-route.ts \
            __tests__/lib/api-factories/qualification-route.test.ts \
            package.json \
            package-lock.json

      - name: Focused tests
        working-directory: smkc-score-app
        run: >-
          npx jest --runTestsByPath
          "__tests__/lib/api-factories/qualification-route.test.ts"
          "__tests__/app/api/tournaments/route.test.ts"
          --runInBand --no-coverage

      - name: Capture full unit-test diagnostics
        shell: bash
        run: |
          set +e
          cd smkc-score-app
          npm test -- --ci --forceExit > ../.github/pr3053-full-test.log 2>&1
          status=$?
          cat ../.github/pr3053-full-test.log
          echo "$status" > ../.github/pr3053-full-test.status
          exit 0
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Commit full-test diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/pr3053-full-test.log .github/pr3053-full-test.status
          git commit -m "chore: record PR 3053 full-test diagnostics"
          git push origin HEAD:codex/new-tournaments-cdm-only
          exit 1
