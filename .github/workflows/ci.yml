name: CI

on:
  push:
    branches: [main]
    paths:
      - "smkc-score-app/**"
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-archive-json-nulls
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Capture archive restore test failure
        run: |
          set +e
          npm test -- --runInBand --verbose __tests__/lib/tournament-archive-restore.test.ts > /tmp/archive-restore-test.log 2>&1
          status=$?
          tail -n 220 /tmp/archive-restore-test.log > .archive-restore-test-failure.txt
          cat .archive-restore-test-failure.txt
          if [ "$status" -ne 0 ]; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .archive-restore-test-failure.txt
            if ! git diff --cached --quiet; then
              git commit -m "chore: capture archive restore test failure"
              git push origin HEAD:fix/restore-archive-json-nulls
            fi
          fi
          exit "$status"
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
