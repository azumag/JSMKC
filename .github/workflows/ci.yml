name: CI

on:
  push:
    branches: [main, fix/archive-restore-id-only-lookup]
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/archive-restore-id-only-lookup
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply id-only existence lookup
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/lib/tournament-archive-restore.ts')
          text = path.read_text()

          lookup_start = text.index("const existing = await runRestoreStage('existing tournament lookup'")
          lookup_end = text.index("\n  const { playerIds", lookup_start)
          old_block = text[lookup_start:lookup_end]

          new_block = """const existing = await runRestoreStage('existing tournament lookup', () =>
    retryDbRead(() =>
      prisma.tournament.findUnique({
        where: { id: tournamentId },
        select: { id: true },
      }),
    ),
  );
  if (existing) {
    const tournament = await runRestoreStage('existing tournament refresh', () =>
      prisma.tournament.update({
        where: { id: tournamentId },
        data: { status: 'active', publicModes: [] },
        select: RESTORED_TOURNAMENT_SELECT,
      }),
    );
    return { tournament, restoredPlayerCount: 0, reusedPlayerCount: 0 };
  }
"""

          if "select: { id: true }" not in old_block:
              text = text[:lookup_start] + new_block + text[lookup_end:]
              path.write_text(text)
          PY

          npx prettier --write \
            "src/lib/tournament-archive-restore.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore-query-shape.test.ts"

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore-query-shape.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "fix: use id-only archive restore existence lookup"
            git push origin HEAD:fix/archive-restore-id-only-lookup
          fi

      - name: Lint
        run: npm run lint

      - name: Focused tests
        run: npm test -- --runInBand __tests__/lib/tournament-archive-restore.test.ts __tests__/lib/tournament-archive-restore-query-shape.test.ts __tests__/app/api/tournaments/[id]/restore/route.test.ts
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
