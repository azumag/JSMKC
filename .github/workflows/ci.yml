name: CI

on:
  push:
    branches: [main]
    paths:
      - "smkc-score-app/**"
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-archive-json-nulls
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format archive restore changes
        run: |
          npx prettier --write \
            "src/lib/tournament-archive-restore.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "style: format archive JSON restore changes"
            git push origin HEAD:fix/restore-archive-json-nulls
          fi

      - name: Lint
        run: npm run lint

      - name: Check formatting of changed files
        run: npm run format:check
        env:
          FORMAT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORMAT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"
