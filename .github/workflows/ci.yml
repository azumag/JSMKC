name: CI

on:
  push:
    branches: [main]
    paths:
      - "smkc-score-app/**"
  pull_request:
    paths:
      - "smkc-score-app/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Refresh dependency lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Upload refreshed lockfile
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-package-lock
          path: smkc-score-app/package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting of changed files
        run: npm run format:check
        env:
          FORMAT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORMAT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Security audit
        id: security-audit
        # Capture the machine-readable report so dependency failures can be diagnosed
        # without weakening the high/critical vulnerability gate.
        continue-on-error: true
        run: |
          set -o pipefail
          npm audit --audit-level=high --json | tee npm-audit.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: smkc-score-app/npm-audit.json
          if-no-files-found: error
          retention-days: 1

      - name: Unit tests
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Enforce security audit result
        if: steps.security-audit.outcome == 'failure'
        run: exit 1
