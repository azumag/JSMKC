name: CI

on:
  push:
    branches: [main]
    paths:
      - "smkc-score-app/**"
  pull_request:
    paths:
      - "smkc-score-app/**"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format archived reopen changes
        run: |
          npx prettier --write \
            "src/lib/tournament-archive-restore.ts" \
            "src/lib/tournament-status-update.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts" \
            "__tests__/lib/tournament-status-update.test.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "src/lib/tournament-status-update.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts" \
            "__tests__/lib/tournament-status-update.test.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "style: format archived reopen changes"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"
