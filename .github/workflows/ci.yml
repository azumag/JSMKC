name: CI

on:
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/archive-restore-narrow-tournament-read
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format changed files
        run: |
          npx prettier --write \
            "src/lib/tournament-archive-restore.ts" \
            "__tests__/lib/tournament-archive-restore-query-shape.test.ts"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "__tests__/lib/tournament-archive-restore-query-shape.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "style: format archive restore lookup fix"
            git push origin HEAD:fix/archive-restore-narrow-tournament-read
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --runInBand __tests__/lib/tournament-archive-restore.test.ts __tests__/lib/tournament-archive-restore-query-shape.test.ts
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
