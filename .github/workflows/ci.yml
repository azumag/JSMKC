name: CI

on:
  push:
    branches: [main]
    paths:
      - "smkc-score-app/**"
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Diagnose archive restore test
        run: npm test -- --runInBand --verbose __tests__/lib/tournament-archive-restore.test.ts
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
