name: CI

on:
  push:
    branches: [main, fix/chunk-archive-restore-writes]
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "smkc-score-app/**"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1-safe archive restore writes
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/fix/chunk-archive-restore-writes' }}
        run: |
          python - <<'PY'
          from pathlib import Path

          restore_path = Path('src/lib/tournament-archive-restore.ts')
          restore = restore_path.read_text()
          marker = 'const D1_SAFE_BOUND_PARAMETERS = 80;'
          if marker not in restore:
              restore = restore.replace(
                  "type ArchivedRecord = Record<string, unknown>;\n",
                  """type ArchivedRecord = Record<string, unknown>;

const D1_SAFE_BOUND_PARAMETERS = 80;

type RestoreStageError = Error & { restoreStage: string; cause?: unknown };

export function chunkRowsForD1<T extends object>(
  rows: T[],
  maxBoundParameters = D1_SAFE_BOUND_PARAMETERS,
): T[][] {
  if (maxBoundParameters < 1) throw new Error('maxBoundParameters must be positive');

  const chunks: T[][] = [];
  let current: T[] = [];
  let currentBindings = 0;

  for (const row of rows) {
    const rowBindings = Object.values(row).filter((value) => value !== undefined).length;
    if (rowBindings > maxBoundParameters) {
      throw new Error(`A single archive row requires ${rowBindings} bound parameters`);
    }
    if (current.length > 0 && currentBindings + rowBindings > maxBoundParameters) {
      chunks.push(current);
      current = [];
      currentBindings = 0;
    }
    current.push(row);
    currentBindings += rowBindings;
  }

  if (current.length > 0) chunks.push(current);
  return chunks;
}

async function createManyInD1Chunks<T extends object>(
  stage: string,
  rows: T[],
  write: (chunk: T[]) => Promise<unknown>,
): Promise<void> {
  for (const chunk of chunkRowsForD1(rows)) {
    try {
      await write(chunk);
    } catch (cause) {
      throw Object.assign(new Error(`Archive restore failed at ${stage}`), {
        restoreStage: stage,
        cause,
      }) as RestoreStageError;
    }
  }
}
""",
              )

              start = restore.index("    if (bmQualifications.length > 0) {")
              end = restore.index("\n\n    const tournament = await prisma.tournament.findUnique", start)
              replacement = """    await createManyInD1Chunks('BM qualifications', bmQualifications, (chunk) =>
      prisma.bMQualification.createMany({
        data: chunk as unknown as Prisma.BMQualificationCreateManyInput[],
      }),
    );
    await createManyInD1Chunks('MR qualifications', mrQualifications, (chunk) =>
      prisma.mRQualification.createMany({
        data: chunk as unknown as Prisma.MRQualificationCreateManyInput[],
      }),
    );
    await createManyInD1Chunks('GP qualifications', gpQualifications, (chunk) =>
      prisma.gPQualification.createMany({
        data: chunk as unknown as Prisma.GPQualificationCreateManyInput[],
      }),
    );
    await createManyInD1Chunks('BM matches', bmMatches, (chunk) =>
      prisma.bMMatch.createMany({ data: chunk as unknown as Prisma.BMMatchCreateManyInput[] }),
    );
    await createManyInD1Chunks('MR matches', mrMatches, (chunk) =>
      prisma.mRMatch.createMany({ data: chunk as unknown as Prisma.MRMatchCreateManyInput[] }),
    );
    await createManyInD1Chunks('GP matches', gpMatches, (chunk) =>
      prisma.gPMatch.createMany({ data: chunk as unknown as Prisma.GPMatchCreateManyInput[] }),
    );
    await createManyInD1Chunks('TA entries', ttEntries, (chunk) =>
      prisma.tTEntry.createMany({ data: chunk as unknown as Prisma.TTEntryCreateManyInput[] }),
    );
    await createManyInD1Chunks('TA phase rounds', ttPhaseRounds, (chunk) =>
      prisma.tTPhaseRound.createMany({
        data: chunk as unknown as Prisma.TTPhaseRoundCreateManyInput[],
      }),
    );
    await createManyInD1Chunks('TA sudden-death rounds', ttSuddenDeathRounds, (chunk) =>
      prisma.tTPhaseSuddenDeathRound.createMany({
        data: chunk as unknown as Prisma.TTPhaseSuddenDeathRoundCreateManyInput[],
      }),
    );
    await createManyInD1Chunks('overall ranking scores', tournamentScores, (chunk) =>
      prisma.tournamentPlayerScore.createMany({ data: chunk }),
    );"""
              restore = restore[:start] + replacement + restore[end:]
              restore_path.write_text(restore)

          test_path = Path('__tests__/lib/tournament-archive-restore.test.ts')
          test = test_path.read_text()
          if 'chunkRowsForD1' not in test:
              test = test.replace(
                  "import { restoreTournamentArchiveForReopen } from '@/lib/tournament-archive-restore';",
                  "import { chunkRowsForD1, restoreTournamentArchiveForReopen } from '@/lib/tournament-archive-restore';",
              )
              test = test.replace(
                  "describe('restoreTournamentArchiveForReopen', () => {",
                  """describe('chunkRowsForD1', () => {
  it('keeps every createMany statement below the D1 bound-parameter limit', () => {
    const rows = Array.from({ length: 7 }, (_, rowIndex) =>
      Object.fromEntries(Array.from({ length: 30 }, (_, columnIndex) => [`field${columnIndex}`, `${rowIndex}`])),
    );

    const chunks = chunkRowsForD1(rows);

    expect(chunks.map((chunk) => chunk.length)).toEqual([2, 2, 2, 1]);
    for (const chunk of chunks) {
      const bindings = chunk.reduce(
        (total, row) => total + Object.values(row).filter((value) => value !== undefined).length,
        0,
      );
      expect(bindings).toBeLessThanOrEqual(80);
    }
  });
});

describe('restoreTournamentArchiveForReopen', () => {""",
              )
              test_path.write_text(test)

          route_path = Path('src/app/api/tournaments/[id]/restore/route.ts')
          route = route_path.read_text()
          if 'restoreStageFromError' not in route:
              route = route.replace(
                  "import { restoreTournamentArchiveForReopen } from '@/lib/tournament-archive-restore';\n",
                  """import { restoreTournamentArchiveForReopen } from '@/lib/tournament-archive-restore';

function restoreStageFromError(error: unknown): string | null {
  if (!error || typeof error !== 'object' || !('restoreStage' in error)) return null;
  return typeof error.restoreStage === 'string' && error.restoreStage.trim() ? error.restoreStage : null;
}
""",
              )
              route = route.replace(
                  "    return createErrorResponse('Failed to restore tournament archive', 500, 'INTERNAL_ERROR');",
                  """    const stage = restoreStageFromError(error);
    return createErrorResponse(
      stage ? `Failed to restore tournament archive (${stage})` : 'Failed to restore tournament archive',
      500,
      'INTERNAL_ERROR',
    );""",
              )
              route_path.write_text(route)

          route_test_path = Path('__tests__/app/api/tournaments/[id]/restore/route.test.ts')
          route_test = route_test_path.read_text()
          if 'reports the failed restore stage' not in route_test:
              route_test = route_test.replace(
                  "  it('rejects non-admin callers', async () => {",
                  """  it('reports the failed restore stage to the admin caller', async () => {
    jest.mocked(restoreTournamentArchiveForReopen).mockRejectedValue(
      Object.assign(new Error('too many SQL variables'), { restoreStage: 'BM matches' }),
    );

    await POST(new NextRequest('http://localhost/api/tournaments/archived-1/restore', { method: 'POST' }), {
      params: Promise.resolve({ id: 'archived-1' }),
    });

    expect(NextResponse.json).toHaveBeenCalledWith(
      expect.objectContaining({ success: false, error: 'Failed to restore tournament archive (BM matches)' }),
      { status: 500 },
    );
  });

  it('rejects non-admin callers', async () => {""",
              )
              route_test_path.write_text(route_test)
          PY
          npx prettier --write \
            "src/lib/tournament-archive-restore.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "fix: chunk archive restore writes for D1"
            git push origin HEAD:fix/chunk-archive-restore-writes
          fi

      - name: Lint
        run: npm run lint

      - name: Check formatting of changed files
        run: npm run format:check
        env:
          FORMAT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          FORMAT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Unit tests
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"
