name: CI

on:
  push:
    branches: [main, fix/archive-restore-id-only-lookup]
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "smkc-score-app/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/archive-restore-id-only-lookup
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format changed files
        run: |
          npx prettier --write \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "style: format archive restore diagnostics"
            git push origin HEAD:fix/archive-restore-id-only-lookup
          fi

      - name: Lint
        run: npm run lint

      - name: Focused tests
        run: npm test -- --runInBand __tests__/app/api/tournaments/[id]/restore/route.test.ts
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
