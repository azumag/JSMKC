name: D1 Migrate

on:
  # Production deploys run migrations in the Cloudflare Workers deploy command
  # (`npm run deploy:cf`). Keep this workflow manual for emergency replays so
  # GitHub Actions and Cloudflare Builds cannot race on the same D1 migration.
  workflow_dispatch:

concurrency:
  group: d1-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply D1 migrations (remote)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: List pending migrations
        run: npm run db:migrations:list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply migrations
        run: npm run db:migrations:apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
