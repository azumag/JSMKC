name: D1 Migrate

on:
  # Auto-apply whenever a migration file lands on main. This workflow was
  # briefly push-triggered (#718, after migration 0027 shipped unapplied and
  # broke prod), then narrowed to workflow_dispatch-only two days later (#815)
  # on the assumption that Cloudflare Workers Builds runs `npm run deploy:cf`
  # (which chains `db:migrations:apply` before `wrangler deploy`) on every
  # merge to main. That assumption was never actually true: Workers Builds'
  # dashboard-configured build command does not run migrations, so every
  # migration since #815 has only ever been applied via manual
  # workflow_dispatch catch-up runs (#3017's 0042/0043 being the latest
  # example — both sat unapplied on production until a manual replay).
  # Keep workflow_dispatch too, for ad hoc/emergency replays.
  push:
    branches: [main]
    paths:
      - "smkc-score-app/migrations/**"
      - ".github/workflows/d1-migrate.yml"
  workflow_dispatch:

concurrency:
  group: d1-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    name: Apply D1 migrations (remote)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: List pending migrations
        run: npm run db:migrations:list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply migrations
        run: npm run db:migrations:apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Confirm no migrations remain pending (audit log)
        run: npm run db:migrations:list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
