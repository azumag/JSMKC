name: D1 Migrate

on:
  # Temporary PR trigger for the emergency replay on 2026-07-11.
  # This branch is reset to main after the run completes.
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/d1-migrate.yml"
  workflow_dispatch:

concurrency:
  group: d1-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'ops/apply-missing-d1-migrations'
    name: Apply D1 migrations (remote)
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: smkc-score-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: List pending migrations
        run: npm run db:migrations:list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply migrations
        run: npm run db:migrations:apply
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
