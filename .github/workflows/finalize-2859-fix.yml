name: Finalize qualification setup fix

on:
  push:
    branches:
      - codex/issue-2859-setup-error-handler
    paths:
      - .github/workflows/finalize-2859-fix.yml
  pull_request:
    paths:
      - .github/workflows/finalize-2859-fix.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/issue-2859-setup-error-handler
          fetch-depth: 0

      - name: Merge latest main and resolve the i18n guard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-edit origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            cat > smkc-score-app/__tests__/static/qualification-i18n-fallbacks.test.ts <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';

          describe('qualification page i18n errors', () => {
            const setupHook = fs.readFileSync(
              path.join(process.cwd(), 'src', 'lib', 'hooks', 'useQualificationSetup.ts'),
              'utf8',
            );

            it('keeps setup error fallbacks in the typed common message catalog', () => {
              const networkErrorTranslation = /message:\s*tc\s*\(\s*(['"])networkError\1\s*\)/;
              const setupFallbackTranslation =
                /tc\s*\(\s*isValidation\s*\?\s*(['"])setupValidationError\1\s*:\s*(['"])setupServerError\2\s*\)/;

              expect(setupHook).toMatch(networkErrorTranslation);
              expect(setupHook).toMatch(setupFallbackTranslation);
              expect(setupHook).not.toContain('Network error — please try again');
            });

            it.each(['bm', 'mr', 'gp'])('%s keeps other qualification errors localized', (mode) => {
              const source = fs.readFileSync(
                path.join(process.cwd(), 'src', 'app', 'tournaments', '[id]', mode, 'page-client.tsx'),
                'utf8',
              );

              const failedGenerateBracketTranslation = /tc\s*\(\s*(['"])failedGenerateBracket\1\s*\)/;
              const networkErrorAlert = /alert\s*\(\s*tc\s*\(\s*(['"])networkError\1\s*\)\s*\)/;

              expect(source).toMatch(failedGenerateBracketTranslation);
              expect(source).not.toMatch(networkErrorAlert);
              expect(source).not.toContain('Network error — please try again');
            });
          });
          EOF
            sed -i 's/^          //' smkc-score-app/__tests__/static/qualification-i18n-fallbacks.test.ts
            git add smkc-score-app/__tests__/static/qualification-i18n-fallbacks.test.ts
            git commit --no-edit
          fi

      - name: Fix generated test and remove temporary files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('smkc-score-app/__tests__/components/tournament/group-setup-dialog.test.tsx')
          text = path.read_text(encoding='utf-8')
          suffix = "\n});\n\n});\n"
          if not text.endswith(suffix):
              raise SystemExit('unexpected test file ending')
          path.write_text(text.removesuffix("\n});\n"), encoding='utf-8')

          Path('.github/apply-2859-prettier.log').unlink(missing_ok=True)
          Path('.github/workflows/finalize-2859-fix.yml').unlink(missing_ok=True)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Install dependencies
        working-directory: smkc-score-app
        run: npm ci

      - name: Format changed files
        working-directory: smkc-score-app
        run: |
          npx prettier --write \
            src/lib/hooks/useQualificationSetup.ts \
            src/components/tournament/group-setup-dialog.tsx \
            'src/app/tournaments/[id]/bm/page-client.tsx' \
            'src/app/tournaments/[id]/mr/page-client.tsx' \
            'src/app/tournaments/[id]/gp/page-client.tsx' \
            messages/en.json messages/ja.json \
            __tests__/lib/hooks/useQualificationSetup.test.ts \
            __tests__/components/tournament/group-setup-dialog.test.tsx \
            __tests__/static/qualification-i18n-fallbacks.test.ts \
            __tests__/static/qualification-setup-contract.test.ts \
            __tests__/static/tc-1007-group-setup-dialog-prop-contract.test.ts

      - name: Lint
        working-directory: smkc-score-app
        run: npm run lint

      - name: Check formatting
        working-directory: smkc-score-app
        run: npm run format:check

      - name: Security audit
        working-directory: smkc-score-app
        run: npm audit --audit-level=high

      - name: Unit tests
        working-directory: smkc-score-app
        run: npm test -- --ci --forceExit
        env:
          SKIP_OPENNEXT_CLOUDFLARE_DEV: "1"
          NODE_ENV: test
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Commit validated fix
        shell: bash
        run: |
          git add -A
          git diff --cached --check
          git commit -m "fix: preserve qualification setup input on failure"
          git push
