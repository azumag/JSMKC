name: Temporary verify PR 3052 review findings

on:
  push:
    branches:
      - codex/3051-cdm-archive-schedule-reconcile

concurrency:
  group: pr-3052-review-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/3051-cdm-archive-schedule-reconcile

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json

      - name: Run verification and capture diagnostics
        continue-on-error: true
        shell: bash
        run: |
          set +e
          log=.github/pr3052-fix-status.txt
          : > "$log"
          status=0

          run_step() {
            label="$1"
            shift
            echo "===== $label =====" | tee -a "$log"
            "$@" >> "$log" 2>&1
            rc=$?
            echo "exit_code=$rc" | tee -a "$log"
            if [ "$rc" -ne 0 ]; then
              status="$rc"
              return "$rc"
            fi
            return 0
          }

          run_step "npm ci" bash -lc 'cd smkc-score-app && npm ci --silent --no-audit --no-fund'
          if [ "$status" -eq 0 ]; then
            run_step "repair SQLite guard paths" python3 - <<'PY'
          from pathlib import Path

          path = Path('smkc-score-app/src/lib/cdm-qualification-reconciliation-service.ts')
          source = path.read_text()
          replacements = {
              "THEN '$' ELSE '$[RECONCILIATION_STALE_PREVIEW' END":
                  "THEN '$' ELSE '$..RECONCILIATION_STALE_PREVIEW' END",
              "THEN '$' ELSE '$[RECONCILIATION_POSTCONDITION_FAILED' END":
                  "THEN '$' ELSE '$..RECONCILIATION_POSTCONDITION_FAILED' END",
          }
          for old, new in replacements.items():
              if old in source:
                  source = source.replace(old, new)
              elif new not in source:
                  raise SystemExit(f'guard path snippet not found: {old}')
          path.write_text(source)
          PY
          fi
          if [ "$status" -eq 0 ]; then
            run_step "prettier" bash -lc 'cd smkc-score-app && npx prettier --write \
              src/lib/cdm-archive-reconciliation-policy.ts \
              src/lib/cdm-qualification-reconciliation.ts \
              src/lib/cdm-qualification-reconciliation-service.ts \
              src/app/api/tournaments/route.ts \
              src/app/api/tournaments/[id]/route.ts \
              src/app/api/tournaments/[id]/qualification-schedule/reconcile/route.ts \
              src/app/api/tournaments/[id]/archive/route.ts \
              src/app/tournaments/[id]/cdm-archive-reconcile/page.tsx \
              src/components/tournament/cdm-archive-reconcile-button.tsx \
              __tests__/lib/cdm-qualification-reconciliation.test.ts \
              __tests__/lib/cdm-qualification-reconciliation-service.test.ts \
              __tests__/lib/cdm-qualification-reconciliation-sqlite.test.ts \
              __tests__/app/api/tournaments/[id]/qualification-schedule/reconcile/route.test.ts \
              __tests__/app/api/tournaments/[id]/archive/route.test.ts \
              __tests__/docs/prisma-migrations.test.ts && npx prisma format'
          fi
          if [ "$status" -eq 0 ]; then
            run_step "focused tests" bash -lc 'cd smkc-score-app && npx jest --runTestsByPath \
              __tests__/lib/cdm-qualification-reconciliation.test.ts \
              __tests__/lib/cdm-qualification-reconciliation-service.test.ts \
              __tests__/lib/cdm-qualification-reconciliation-sqlite.test.ts \
              "__tests__/app/api/tournaments/[id]/qualification-schedule/reconcile/route.test.ts" \
              "__tests__/app/api/tournaments/[id]/archive/route.test.ts" \
              __tests__/docs/prisma-migrations.test.ts \
              --runInBand --no-coverage'
          fi
          if [ "$status" -eq 0 ]; then
            run_step "production build" bash -lc 'cd smkc-score-app && npm run build'
          fi

          echo "PIPELINE_STATUS=$status" >> "$GITHUB_ENV"
          echo "final_status=$status" | tee -a "$log"
          exit 0

      - name: Commit verified changes or diagnostics
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add smkc-score-app .github/pr3052-fix-status.txt
          if git diff --cached --quiet; then
            echo 'No source or diagnostic changes to commit'
          else
            if [ "${PIPELINE_STATUS:-1}" = "0" ]; then
              git commit -m "fix: verify CDM reconciliation review findings"
            else
              git commit -m "chore: record PR 3052 verification failure"
            fi
            git push origin HEAD:codex/3051-cdm-archive-schedule-reconcile
          fi

      - name: Fail when verification failed
        if: env.PIPELINE_STATUS != '0'
        run: exit "${PIPELINE_STATUS:-1}"
