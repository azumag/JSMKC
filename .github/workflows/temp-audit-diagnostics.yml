name: Temporary npm audit diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smkc-score-app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/new-tournaments-cdm-only
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json
      - name: Install dependencies
        run: npm ci --silent --no-audit --no-fund
      - name: Capture security audit details
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high > ../.github/npm-audit-diagnostics.txt 2>&1
          status=$?
          cat ../.github/npm-audit-diagnostics.txt
          echo "$status" > ../.github/npm-audit-status.txt
          exit 0
      - name: Commit diagnostics
        working-directory: .
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/npm-audit-diagnostics.txt .github/npm-audit-status.txt
          git commit -m "chore: record npm audit diagnostics"
          git push origin HEAD:codex/new-tournaments-cdm-only
