name: Format archived reopen changes

on:
  push:
    branches:
      - fix/reopen-archived-tournament

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, 'style: format archived reopen changes') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smkc-score-app
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/reopen-archived-tournament
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: smkc-score-app/package-lock.json
      - run: npm ci
      - name: Format changed files
        run: >-
          npx prettier --write
          "src/lib/tournament-archive-restore.ts"
          "src/lib/tournament-status-update.ts"
          "src/app/api/tournaments/[id]/restore/route.ts"
          "__tests__/lib/tournament-archive-restore.test.ts"
          "__tests__/lib/tournament-status-update.test.ts"
          "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            "src/lib/tournament-archive-restore.ts" \
            "src/lib/tournament-status-update.ts" \
            "src/app/api/tournaments/[id]/restore/route.ts" \
            "__tests__/lib/tournament-archive-restore.test.ts" \
            "__tests__/lib/tournament-status-update.test.ts" \
            "__tests__/app/api/tournaments/[id]/restore/route.test.ts"
          if ! git diff --cached --quiet; then
            git commit -m "style: format archived reopen changes"
            git push origin HEAD:fix/reopen-archived-tournament
          fi
