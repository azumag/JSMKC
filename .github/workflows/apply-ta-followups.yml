name: Apply TA follow-up patch

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/resolve-ta-battle-royale-followups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Diagnose staged patch
        shell: bash
        run: |
          set +e
          {
            echo "files:"
            ls -la .followup-patch
            cat .followup-patch/part* | tr -d '\r\n' > /tmp/followups.b64
            echo "base64 sha256:"
            sha256sum /tmp/followups.b64
            base64 --decode /tmp/followups.b64 | gzip --decompress > /tmp/followups.patch
            echo "decode status: ${PIPESTATUS[*]}"
            echo "patch sha256:"
            sha256sum /tmp/followups.patch
            echo "git apply check:"
            git apply --check /tmp/followups.patch
            echo "apply status: $?"
          } > .followup-patch/diagnostic.txt 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .followup-patch/diagnostic.txt
          git commit -m "chore: record TA follow-up patch diagnostics"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
