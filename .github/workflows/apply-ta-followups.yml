name: Finalize TA follow-up PR

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/resolve-ta-battle-royale-followups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove temporary tooling and fix localized label
        shell: bash
        run: |
          set -euxo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/export-followup-source.yml

          python - <<'PY'
          from pathlib import Path

          page = Path('smkc-score-app/src/app/tournaments/[id]/ta/page-client.tsx')
          text = page.read_text()
          old = '<TableHead>ハンデ</TableHead>'
          if text.count(old) != 2:
              raise SystemExit(f'expected two hard-coded handicap headings, found {text.count(old)}')
          page.write_text(text.replace(old, "<TableHead>{t('handicap')}</TableHead>"))

          replacements = {
              Path('smkc-score-app/messages/en.json'): (
                  '"manageTournamentHandicaps": "Manage tournament handicaps",',
                  '"handicap": "Handicap",\n    "manageTournamentHandicaps": "Manage tournament handicaps",',
              ),
              Path('smkc-score-app/messages/ja.json'): (
                  '"manageTournamentHandicaps": "大会内ハンデ管理",',
                  '"handicap": "ハンデ",\n    "manageTournamentHandicaps": "大会内ハンデ管理",',
              ),
          }
          for path, (old_text, new_text) in replacements.items():
              content = path.read_text()
              if content.count(old_text) != 1:
                  raise SystemExit(f'expected one insertion point in {path}')
              path.write_text(content.replace(old_text, new_text))
          PY

          rm -f .github/workflows/apply-ta-followups.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: remove temporary tooling and localize handicap labels"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
