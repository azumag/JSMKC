name: Apply TA follow-up patch

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/resolve-ta-battle-royale-followups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply staged patch
        shell: bash
        run: |
          if [ ! -f .followup-patch/part00 ]; then
            echo "Patch already applied"
            exit 0
          fi
          cat .followup-patch/part* | base64 --decode | gzip --decompress > /tmp/followups.patch
          git apply --index /tmp/followups.patch
          rm -rf .followup-patch
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: resolve TA battle royale follow-ups"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
