name: Apply TA follow-up patch

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'codex/resolve-ta-battle-royale-followups'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false
      - name: Apply verified patch
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -f .followup-patch/part00_00 ]; then
            echo "Patch already applied"
            exit 0
          fi
          cat .followup-patch/part* | tr -d '\r\n' > /tmp/followups.b64
          echo "ae60f65acfcebb11db0f2aa7e472fb4e3c32dbe5665917531900598a1420e016  /tmp/followups.b64" | sha256sum --check
          base64 --decode /tmp/followups.b64 | gzip --decompress > /tmp/followups.patch
          echo "603b20403e5ade957d0c3249bc3d8cf46fc13afa75d51e8fb0fcd24d96de2b54  /tmp/followups.patch" | sha256sum --check
          git apply --index /tmp/followups.patch
          rm -rf .followup-patch
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: resolve TA battle royale follow-ups"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
